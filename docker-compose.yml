# docker-compose.yml
#
# Local development compose file. NOT for production — `fly deploy` is the
# production path. This is purely for:
#   - Verifying the Dockerfile builds on your machine before pushing.
#   - Running an integration test against the production-ish image.
#   - Onboarding a new dev who doesn't want to install Node / argon2 locally.
#
# Differences from production (Fly):
#   - No Litestream replication (LITESTREAM_BUCKET unset → entrypoint skips it).
#   - Bind-mounted data dir for inspectability (so you can `sqlite3 ./data/caas.db`
#     from your host).
#   - Dev-only placeholder secrets. NEVER use these in production.
#
# Usage:
#   docker compose up --build       # build image and start
#   docker compose down             # stop and remove containers
#   docker compose down -v          # ...and wipe the data volume

services:
  caas-lite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caas-lite-dev
    ports:
      # Maps host 8080 → container 8080. If you have something else on
      # 8080 locally (another dev stack, etc.), change the left side.
      - "8080:8080"
    environment:
      # Match the production env shape so the local container exercises
      # the same code paths. PORT is also set in the Dockerfile but
      # listing it here makes the contract visible.
      NODE_ENV: production
      PORT:     "8080"

      # Dev-only secrets. The app's boot-time check (auth.ts) throws if
      # JWT_*_SECRET are unset, so we must provide *something*. These
      # values are intentionally weak placeholders — production uses
      # `fly secrets set` with real high-entropy values.
      JWT_ACCESS_SECRET:  "dev-jwt-access-secret-change-me-min-32-chars"
      JWT_REFRESH_SECRET: "dev-jwt-refresh-secret-change-me-min-32-chars"

      # LITESTREAM_BUCKET deliberately unset → docker-entrypoint.sh
      # detects this and runs without replication. Local dev does not
      # need backups.

    volumes:
      # Bind-mount ./data so SQLite files survive container restarts AND
      # are inspectable from the host. The directory is created on first
      # `up` if missing.
      - ./data:/data

    # Restart policy: unless-stopped means "restart on crash, but not
    # after a deliberate `docker compose down`." Good local-dev default;
    # production restart policy is owned by Fly.
    restart: unless-stopped

    # The Dockerfile already declares HEALTHCHECK — compose honors it,
    # so `docker compose ps` shows healthy/unhealthy. Listing healthcheck
    # here would override it; we deliberately don't.
