# fly.toml app configuration file generated for caas-lite on 2026-05-20T21:29:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'caas-lite'
primary_region = 'lhr'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
DB_PATH  = "/data/caas.db"

[processes]
  app = ''

[[mounts]]
  source = 'caas_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
